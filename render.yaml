services:
  - type: web
    name: voxify
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: DEMO_MODE
        value: "true"
      - key: TRUST_PROXY
        value: "1"
      - key: SESSION_SECRET
        generateValue: true
      - key: ELEVENLABS_TTS_MODEL
        value: eleven_multilingual_v2
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
